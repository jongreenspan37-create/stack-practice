services:
  db:
    image: postgres:15
    container_name: db_webapp
    env_file:
      - .env
    volumes:
      - webapp_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: backend_webapp
    env_file:
      - .env
    volumes:
      - ./backend/app:/code/app
      - ./backend/alembic:/code/alembic
      - ./backend/alembic.ini:/code/alembic.ini
    ports:
      - "8001:8000"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: frontend_webapp
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host
    ports:
      - "5174:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  webapp_postgres_data:
  frontend_node_modules: